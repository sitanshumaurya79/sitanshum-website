<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jigsaw Puzzle Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #2c3e50;
            color: white;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-bottom: 10px; }
        .controls {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover { background-color: #2ecc71; }
        #board {
            width: 400px;
            height: 400px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            border: 4px solid #ecf0f1;
            background-color: #34495e;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.5);
        }
        .tile {
            box-sizing: border-box;
            border: 1px solid #ffffff33;
            cursor: grab;
            background-image: url('https://images.unsplash.com/photo-1546527868-ccb7ee7fd897?q=80&w=400&h=400&auto=format&fit=crop'); /* Yahan apni image ka link dalein */
            background-size: 400px 400px;
        }
        .tile:active { cursor: grabbing; }
        #message {
            font-size: 24px;
            margin-top: 20px;
            color: #f1c40f;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Jigsaw Puzzle Game</h1>
    <p>Tukdo ko drag aur drop karke image banayein!</p>
    
    <div class="controls">
        <button onclick="startGame(3)">Easy (3x3)</button>
        <button onclick="startGame(4)">Medium (4x4)</button>
        <button onclick="startGame(5)">Hard (5x5)</button>
        <button onclick="toggleMusic()" id="musicBtn" style="background-color: #e67e22;">Play Music</button>
    </div>

    <div id="board"></div>
    <div id="message"></div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="dropSound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="winSound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        const board = document.getElementById('board');
        const message = document.getElementById('message');
        const bgMusic = document.getElementById('bgMusic');
        const dropSound = document.getElementById('dropSound');
        const winSound = document.getElementById('winSound');
        const musicBtn = document.getElementById('musicBtn');

        let gridSize = 3;
        let tiles = [];
        let draggedTile = null;
        let isMusicPlaying = false;

        // Music Play/Pause Toggle
        function toggleMusic() {
            if (isMusicPlaying) {
                bgMusic.pause();
                musicBtn.innerText = "Play Music";
            } else {
                bgMusic.play().catch(() => alert("Browser ne autoplay block kar diya hai, please button dobara dabayein."));
                musicBtn.innerText = "Pause Music";
            }
            isMusicPlaying = !isMusicPlaying;
        }

        // Game Shuru karne ka function
        function startGame(size) {
            gridSize = size;
            board.innerHTML = '';
            message.innerText = '';
            tiles = [];
            
            // Music chalu karein agar pehle se nahi chal raha
            if (!isMusicPlaying) toggleMusic();

            const tileSize = 400 / gridSize;

            // Tiles create karna
            let tileObjects = [];
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    tileObjects.push({
                        id: r * gridSize + c,
                        x: -c * tileSize,
                        y: -r * tileSize
                    });
                }
            }

            // Tiles ko shuffle (mix) karna
            tileObjects.sort(() => Math.random() - 0.5);

            // Board par tiles lagana
            tileObjects.forEach((obj, index) => {
                let tile = document.createElement('div');
                tile.classList.add('tile');
                tile.style.width = tileSize + 'px';
                tile.style.height = tileSize + 'px';
                tile.style.backgroundPosition = `${obj.x}px ${obj.y}px`;
                tile.dataset.correctId = obj.id;
                tile.dataset.currentId = index;
                tile.setAttribute('draggable', true);

                // Drag and Drop Events
                tile.addEventListener('dragstart', dragStart);
                tile.addEventListener('dragover', dragOver);
                tile.addEventListener('drop', dragDrop);

                board.appendChild(tile);
                tiles.push(tile);
            });
        }

        function dragStart(e) {
            draggedTile = this;
        }

        function dragOver(e) {
            e.preventDefault(); // Drop allow karne ke liye jaruri hai
        }

        function dragDrop(e) {
            let targetTile = this;
            if (draggedTile === targetTile) return;

            // Background positions swap karein
            let tempBg = draggedTile.style.backgroundPosition;
            draggedTile.style.backgroundPosition = targetTile.style.backgroundPosition;
            targetTile.style.backgroundPosition = tempBg;

            // IDs swap karein
            let tempId = draggedTile.dataset.correctId;
            draggedTile.dataset.correctId = targetTile.dataset.correctId;
            targetTile.dataset.correctId = tempId
