<!DOCTYPE html>
<html>
<head>
<title>Ludo Board</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.board{
width:450px;
height:450px;
margin:auto;
display:grid;
grid-template-columns:repeat(15,30px);
grid-template-rows:repeat(15,30px);
}

.cell{
border:1px solid #999;
}

.red{background:red;}
.blue{background:blue;}
.green{background:green;}
.yellow{background:yellow;}
.white{background:white;}

</style>

</head>

<body>

<h2>Ludo Board</h2>

<div class="board" id="board"></div>

<script>

let board=document.getElementById("board")

for(let i=0;i<225;i++){

let cell=document.createElement("div")

cell.className="cell white"

board.appendChild(cell)

}

let cells=document.querySelectorAll(".cell")

// simple color areas
for(let i=0;i<30;i++) cells[i].classList.add("red")
for(let i=195;i<225;i++) cells[i].classList.add("blue")
for(let i=30;i<60;i++) cells[i].classList.add("green")
for(let i=165;i<195;i++) cells[i].classList.add("yellow")

</script>

</body>
</html>
