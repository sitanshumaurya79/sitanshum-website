<!DOCTYPE html>
<html>
<head>
  <title>Memory Puzzle</title>
  <style>
    #game {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      grid-gap: 10px;
      width: 440px;
      margin: auto;
    }
    .card {
      width: 100px;
      height: 100px;
      background: lightblue;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
    }
    .hidden {
      background: gray;
      color: transparent;
    }
  </style>
</head>
<body>
  <h2 align="center">Memory Puzzle Game</h2>
  <div id="game"></div>

  <script src="script.js"></script>
</body>
</html>
