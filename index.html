<!DOCTYPE html>
<html>
<head>
<title>Image Puzzle Game - Sitanshu Maurya</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#222;
color:white;
}
#controls{
margin-bottom:15px;
}
#board{
margin:auto;
display:grid;
gap:2px;
background:#333;
}
.tile{
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #fff;
background-size: cover;
background-position: center;
}
button, select{
padding:5px 10px;
margin:5px;
font-size:16px;
}
</style>
</head>
<body>

<h1>Image Puzzle Game</h1>
<h3>By Sitanshu Maurya</h3>

<div id="controls">
<select id="difficulty">
<option value="2">Easy (2x2)</option>
<option value="3">Medium (3x3)</option>
<option value="4">Hard (4x4)</option>
</select>
<button onclick="startGame()">Start</button>
</div>

<div id="board"></div>

<audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" autoplay loop></audio>

<script>
let size=3;
let board=[];
let empty={x:0,y:0};
let boardDiv=document.getElementById("board");
let imgURL="https://i.imgur.com/1wXcVQ2.jpg"; // replace with your image

function startGame(){
size=parseInt(document.getElementById("difficulty").value);
boardDiv.style.gridTemplateColumns=`repeat(${size},100px)`;
boardDiv.style.gridTemplateRows=`repeat(${size},100px)`;
initBoard();
shuffleBoard();
drawBoard();
}

function initBoard(){
board=[];
for(let y=0;y<size;y++){
let row=[];
for(let x=0;x<size;x++){
row.push({num:y*size+x+1});
}
board.push(row);
}
empty={x:size-1,y:size-1};
board[size-1][size-1].num=0;
}

function shuffleBoard(){
for(let i=0;i<1000;i++){
let moves=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
let m=moves[Math.floor(Math.random()*4)];
let nx=empty.x+m.x;
let ny=empty.y+m.y;
if(nx>=0 && nx<size && ny>=0 && ny<size){
board[empty.y][empty.x]=board[ny][nx];
board[ny][nx]={num:0};
empty.x=nx;
empty.y=ny;
}
}
}

function drawBoard(){
boardDiv.innerHTML="";
for(let y=0;y<size;y++){
for(let x=0;x<size;x++){
let cell=document.createElement("div");
cell.classList.add("tile");
cell.style.width="100px";
cell.style.height="100px";
if(board[y][x].num!=0){
cell.style.backgroundImage=`url(${imgURL})`;
let posX=100*(board[y][x].num%size-1);
let posY=100*(Math.floor((board[y][x].num-1)/size));
cell.style.backgroundPosition=`-${posX}px -${posY}px`;
cell.onclick=()=>tileClick(x,y);
}else{
cell.style.background="#222";
}
boardDiv.appendChild(cell);
}
}
}

function tileClick(x,y){
if((Math.abs(empty.x-x)+Math.abs(empty.y-y))==1){
board[empty.y][empty.x]=board[y][x];
board[y][x]={num:0};
empty.x=x;
empty.y=y;
drawBoard();
checkWin();
}
}

function checkWin(){
let count=1;
for(let y=0;y<size;y++){
for(let x=0;x<size;x++){
if(y==size-1 && x==size-1) continue;
if(board[y][x].num!=count) return;
count++;
}
}
setTimeout(()=>{alert("Victory Sitanshu Maurya!");},200);
}
</script>
</body>
</html>
